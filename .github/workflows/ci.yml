name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2
    with:
      enable-summary: true
      enable-sbom-scan: true
      enable-sbom: true
      enable-coverage: true
      enable-audit: true
      otp-version: '28'
      enable-dialyzer: false
      enable-xref: false
      enable-ex-doc: true
      enable-dependency-submission: true

  dogfood:
    name: Self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Taure/erlang-ci@v2
        with:
          otp-version: '28'
      - name: Compile
        run: rebar3 compile
      - name: Dogfood (self-audit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i 's/{project_plugins, \[/{project_plugins, [{rebar3_audit, {git, "https:\/\/github.com\/Taure\/rebar3_audit.git", {branch, "main"}}},/' rebar.config
          rebar3 audit --token "${GITHUB_TOKEN}"
