name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v1
    with:
      otp-version: '28'
      enable-dialyzer: false
      enable-xref: false

  dogfood:
    name: Self-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Taure/erlang-ci@v1
        with:
          otp-version: '28'
      - name: Compile
        run: rebar3 compile
      - name: Dogfood (self-audit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -i 's/{project_plugins, \[/{project_plugins, [{rebar3_audit, {git, "https:\/\/github.com\/Taure\/rebar3_audit.git", {branch, "main"}}},/' rebar.config
          rebar3 audit --token "${GITHUB_TOKEN}"
